<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Projections - Interactive Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: #1e2230;
    --text: #e8eaf0;
    --muted: #5a6070;
    --buy: #22c97a;
    --sell: #f04060;
    --hold: #f0a030;
    --buy-bg: rgba(34,201,122,0.08);
    --sell-bg: rgba(240,64,96,0.08);
    --hold-bg: rgba(240,160,48,0.08);
    --accent: #4f8fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  .header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .subtitle { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 8px; letter-spacing: 1px; }
  .date-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .control-row {
    display: flex;
    gap: 20px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-group label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select, input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:hover, select:focus, input[type="number"]:hover, input[type="number"]:focus {
    border-color: var(--accent);
  }

  input[type="number"] {
    width: 100px;
    font-family: 'DM Mono', monospace;
  }

  .threshold-inputs {
    display: flex;
    gap: 12px;
  }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .card-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .card-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; }
  .card.buy .card-value { color: var(--buy); }
  .card.sell .card-value { color: var(--sell); }
  .card.hold .card-value { color: var(--hold); }
  .card.total .card-value { color: var(--text); }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 32px 0 16px 0;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  td { padding: 11px 14px; font-size: 13px; }
  td.name { font-weight: 500; color: var(--text); }
  td.team { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  td.num  { font-family: 'DM Mono', monospace; text-align: right; color: var(--muted); }
  td.delta { font-family: 'DM Mono', monospace; font-weight: 500; text-align: right; }
  td.delta.pos { color: var(--buy); }
  td.delta.neg { color: var(--sell); }

  .signal-pill {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .signal-pill.BUY  { background: var(--buy-bg);  color: var(--buy);  border: 1px solid rgba(34,201,122,0.25); }
  .signal-pill.SELL { background: var(--sell-bg); color: var(--sell); border: 1px solid rgba(240,64,96,0.25); }
  .signal-pill.HOLD { background: var(--hold-bg); color: var(--hold); border: 1px solid rgba(240,160,48,0.25); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">Baseball Projection Analyzer</div>
    <div class="subtitle">Preseason vs Current (May 4, 2026) · Interactive Thresholds</div>
    <div class="date-badge" id="generated-date"></div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div class="control-group">
        <label for="stat-select">Stat</label>
        <select id="stat-select" onchange="updateAnalysis()">
          <option value="HR">Home Runs (HR)</option>
          <option value="R">Runs (R)</option>
          <option value="RBI">RBI</option>
          <option value="SB">Stolen Bases (SB)</option>
          <option value="AVG">Batting Average (AVG)</option>
          <option value="OBP">On-Base Percentage (OBP)</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="buy-threshold">Buy Threshold ≥</label>
        <input type="number" id="buy-threshold" value="3" step="0.5" onchange="updateAnalysis()">
      </div>
      
      <div class="control-group">
        <label for="sell-threshold">Sell Threshold ≤</label>
        <input type="number" id="sell-threshold" value="-3" step="0.5" onchange="updateAnalysis()">
      </div>
    </div>
  </div>

  <div class="summary" id="summary">
    <div class="card total"><div class="card-label">Total Players</div><div class="card-value" id="sum-total">-</div></div>
    <div class="card buy"><div class="card-label">Buy Signals</div><div class="card-value" id="sum-buy">-</div></div>
    <div class="card hold"><div class="card-label">Hold</div><div class="card-value" id="sum-hold">-</div></div>
    <div class="card sell"><div class="card-label">Sell Signals</div><div class="card-value" id="sum-sell">-</div></div>
  </div>

  <div id="content"></div>

</div>

const STAT_INFO = {
  'HR': { label: 'Home Runs', decimals: 0, defaultBuy: 3, defaultSell: -3 },
  'R': { label: 'Runs', decimals: 0, defaultBuy: 5, defaultSell: -5 },
  'RBI': { label: 'RBI', decimals: 0, defaultBuy: 5, defaultSell: -5 },
  'SB': { label: 'Stolen Bases', decimals: 0, defaultBuy: 3, defaultSell: -3 },
  'AVG': { label: 'Batting Average', decimals: 3, defaultBuy: 0.010, defaultSell: -0.010 },
  'OBP': { label: 'On-Base Percentage', decimals: 3, defaultBuy: 0.010, defaultSell: -0.010 }
};

function updateAnalysis() {
  const stat = document.getElementById('stat-select').value;
  const buyThreshold = parseFloat(document.getElementById('buy-threshold').value);
  const sellThreshold = parseFloat(document.getElementById('sell-threshold').value);
  
  // Update input step size based on stat
  const step = STAT_INFO[stat].decimals === 3 ? '0.001' : '0.5';
  document.getElementById('buy-threshold').step = step;
  document.getElementById('sell-threshold').step = step;
  
  calculateAndDisplay(stat, buyThreshold, sellThreshold);
}

function calculateAndDisplay(stat, buyThreshold, sellThreshold) {
  const info = STAT_INFO[stat];
  const decimals = info.decimals;
  
  // Calculate deltas and signals for all players with this stat
  const results = [];
  PLAYERS_DATA.forEach(player => {
    if (player.stats[stat]) {
      const pre = player.stats[stat].pre;
      const cur = player.stats[stat].cur;
      const delta = cur - pre;
      
      // Determine signal
      let signal;
      if (delta >= buyThreshold) {
        signal = 'BUY';
      } else if (delta <= sellThreshold) {
        signal = 'SELL';
      } else {
        signal = 'HOLD';
      }
      
      results.push({
        name: player.name,
        team: player.team,
        pre: pre,
        cur: cur,
        delta: delta,
        signal: signal
      });
    }
  });
  
  // Update summary
  const counts = { BUY: 0, SELL: 0, HOLD: 0 };
  results.forEach(r => counts[r.signal]++);
  
  document.getElementById('sum-total').textContent = results.length;
  document.getElementById('sum-buy').textContent = counts.BUY;
  document.getElementById('sum-sell').textContent = counts.SELL;
  document.getElementById('sum-hold').textContent = counts.HOLD;
  document.getElementById('generated-date').textContent =
    `Generated: ${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
  
  // Separate and sort
  const buys = results.filter(r => r.signal === 'BUY').sort((a, b) => b.delta - a.delta);
  const sells = results.filter(r => r.signal === 'SELL').sort((a, b) => a.delta - b.delta);
  
  let html = '';
  
  // BUY section
  if (buys.length > 0) {
    html += `
      <div class="section-title">🔥 Buy Signals (${buys.length}) — ${info.label} Trending Up</div>
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>Team</th>
            <th style="text-align:right">Preseason</th>
            <th style="text-align:right">Current</th>
            <th style="text-align:right">Change</th>
            <th>Signal</th>
          </tr>
        </thead>
        <tbody>
    `;
    buys.forEach(r => {
      const sign = r.delta >= 0 ? '+' : '';
      html += `
        <tr>
          <td class="name">${r.name}</td>
          <td class="team">${r.team}</td>
          <td class="num">${r.pre.toFixed(decimals)}</td>
          <td class="num">${r.cur.toFixed(decimals)}</td>
          <td class="delta pos">${sign}${r.delta.toFixed(decimals)}</td>
          <td><span class="signal-pill BUY">BUY</span></td>
        </tr>
      `;
    });
    html += `</tbody></table>`;
  }
  
  // SELL section
  if (sells.length > 0) {
    html += `
      <div class="section-title">📉 Sell Signals (${sells.length}) — ${info.label} Trending Down</div>
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>Team</th>
            <th style="text-align:right">Preseason</th>
            <th style="text-align:right">Current</th>
            <th style="text-align:right">Change</th>
            <th>Signal</th>
          </tr>
        </thead>
        <tbody>
    `;
    sells.forEach(r => {
      html += `
        <tr>
          <td class="name">${r.name}</td>
          <td class="team">${r.team}</td>
          <td class="num">${r.pre.toFixed(decimals)}</td>
          <td class="num">${r.cur.toFixed(decimals)}</td>
          <td class="delta neg">${r.delta.toFixed(decimals)}</td>
          <td><span class="signal-pill SELL">SELL</span></td>
        </tr>
      `;
    });
    html += `</tbody></table>`;
  }
  
  document.getElementById('content').innerHTML = html;
}

// Handle stat change to update default thresholds
document.getElementById('stat-select').addEventListener('change', function() {
  const stat = this.value;
  document.getElementById('buy-threshold').value = STAT_INFO[stat].defaultBuy;
  document.getElementById('sell-threshold').value = STAT_INFO[stat].defaultSell;
});

// Initialize with HR
updateAnalysis();
</script>
